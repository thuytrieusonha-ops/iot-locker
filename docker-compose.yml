name: smartlocker

x-smartlocker-db-env: &smartlocker-db-env
  SMARTLOCKER_DATABASE_HOST: mysql
  SMARTLOCKER_DATABASE_PORT: 3306
  SMARTLOCKER_DATABASE_NAME: ${MYSQL_DATABASE:-smartlocker}
  SMARTLOCKER_DATABASE_USER: ${MYSQL_USER:-smartlocker_user}
  SMARTLOCKER_DATABASE_PASSWORD: ${MYSQL_PASSWORD:-Locker123!}

services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: smartlocker-mqtt
    restart: unless-stopped
    ports:
      - "${SMARTLOCKER_MQTT_HOST_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt-data:/mosquitto/data

  mysql:
    image: mysql:8.4
    container_name: smartlocker-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-smartlocker}
      MYSQL_USER: ${MYSQL_USER:-smartlocker_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Locker123!}
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: smartlocker-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      <<: *smartlocker-db-env
      SMARTLOCKER_APP_HOST: 0.0.0.0
      SMARTLOCKER_APP_PORT: 8000
      SMARTLOCKER_MQTT_HOST: ${SMARTLOCKER_MQTT_HOST:-mqtt}
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "${SMARTLOCKER_APP_HOST_PORT:-8000}:8000"
    volumes:
      - ./order_photos:/app/order_photos
    depends_on:
      mqtt:
        condition: service_started
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: smartlocker-pi-gateway
    restart: unless-stopped
    profiles:
      - hardware
    env_file:
      - .env.docker
    environment:
      SMARTLOCKER_MQTT_HOST: ${SMARTLOCKER_MQTT_HOST:-mqtt}
    command: ["python", "locker_gateway.py"]
    devices:
      - "${SMARTLOCKER_UART_PORT:-/dev/serial0}:${SMARTLOCKER_UART_PORT:-/dev/serial0}"
    depends_on:
      mqtt:
        condition: service_started

  monitor:
    build:
      context: .
      dockerfile: Dockerfile
      target: server
    container_name: smartlocker-monitor
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      <<: *smartlocker-db-env
      SMARTLOCKER_MONITOR_HOST: 0.0.0.0
      SMARTLOCKER_MONITOR_PORT: 8001
    command: ["uvicorn", "monitor:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "${SMARTLOCKER_MONITOR_HOST_PORT:-8001}:8001"
    volumes:
      - ./order_photos:/app/order_photos
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/')"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: smartlocker-cloudflared
    restart: unless-stopped
    profiles:
      - tunnel
    command: ["tunnel", "--config", "/etc/cloudflared/config.docker.yml", "run"]
    depends_on:
      app:
        condition: service_healthy
      monitor:
        condition: service_healthy
    volumes:
      - ./cloudflared:/etc/cloudflared:ro

volumes:
  mysql-data:
  mqtt-data:
